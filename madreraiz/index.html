<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abriendo el Altar de Madre Raíz...</title>
    
    <!-- Redirección HTML Nativa Instantánea (Garantiza velocidad y funciona si JS está desactivado) -->
    <meta http-equiv="refresh" content="0; url=/#madre-raiz">
    
    <style>
        /* Estilos alineados con la identidad de Amarte Viajando */
        body {
            background-color: #faf6f0; /* brandCream */
            color: #1b3a1e; /* brandGreen */
            font-family: 'Crimson Text', Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(176, 135, 58, 0.1); /* brandGold translúcido */
            border-radius: 50%;
            border-top-color: #b0873a; /* brandGold */
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 24px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .poetic-text {
            font-style: italic;
            font-size: 1.25rem;
            letter-spacing: 0.05em;
            color: #1b3a1e;
            opacity: 0.9;
            margin: 0;
            padding: 0 20px;
            animation: pulseText 2s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Animación sutil de carga de la marca -->
    <div class="spinner" aria-hidden="true"></div>
    <p class="poetic-text">Abriendo el Altar de Madre Raíz — Amarte Viajando</p>

    <!-- Redirección por JavaScript (Respaldo inteligente de alto rendimiento para navegadores modernos) -->
    <script>
        // Redirige al lector de forma limpia y directa al hash místico sin guardar el paso intermedio en el historial de navegación
        const targetUrl = window.location.origin + "/#madre-raiz";
        window.location.replace(targetUrl);
    </script>
</body>
</html>
